events {}

http {
  include       /etc/nginx/mime.types;
  client_max_body_size 10m;

  # ── Rate limit zones ─────────────────────────────────────────────────
  # General API: 2 req/s per IP (burst 30)
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=2r/s;
  # Submission service: 20 req/min — exam start + submit are infrequent
  limit_req_zone $binary_remote_addr zone=api_submissions:10m rate=20r/m;
  # Auth endpoints: 20 req/min — prevents brute force
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=20r/m;

  limit_req_status 429;

  upstream gotrue      { server gotrue:9999; }
  upstream users       { server user-service:3002; }
  upstream exams       { server exam-service:3003; }
  upstream submissions { server submission-service:3004; }
  upstream interactions { server interaction-service:3005; }
  upstream frontend    { server frontend:3000; }

  # ── Landing page (phutx.top) ─────────────────────────────────────
  server {
    listen 80;
    server_name phutx.top www.phutx.top;

    location = / {
      root /var/www/landing;
      try_files /index.html =404;
    }

    location /auth/ {
      limit_req zone=api_auth burst=10 nodelay;
      proxy_pass http://gotrue/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
      limit_req zone=api_general burst=30 nodelay;
      proxy_pass http://users/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/exams/exams/internal/       { return 403; }
    location /api/exams/collections/internal/ { return 403; }

    location /api/exams/ {
      limit_req zone=api_general burst=30 nodelay;
      proxy_pass http://exams/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/submissions/ {
      limit_req zone=api_submissions burst=10 nodelay;
      proxy_pass http://submissions/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/interactions/ {
      limit_req zone=api_general burst=30 nodelay;
      proxy_pass http://interactions/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ── External app vhosts ──────────────────────────────────────────
  # Drop .conf files into /opt/nginx/ on the host to add new domains.
  include /opt/nginx/*.conf;

  # ── App (localhost / default) ─────────────────────────────────────
  server {
    listen 80 default_server;

    location /auth/ {
      limit_req zone=api_auth burst=10 nodelay;
      proxy_pass http://gotrue/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
      limit_req zone=api_general burst=30 nodelay;
      proxy_pass http://users/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/exams/exams/internal/       { return 403; }
    location /api/exams/collections/internal/ { return 403; }

    location /api/exams/ {
      limit_req zone=api_general burst=30 nodelay;
      proxy_pass http://exams/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/submissions/ {
      limit_req zone=api_submissions burst=10 nodelay;
      proxy_pass http://submissions/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/interactions/ {
      limit_req zone=api_general burst=30 nodelay;
      proxy_pass http://interactions/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
