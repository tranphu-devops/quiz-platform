events {}

http {
  include       /etc/nginx/mime.types;
  client_max_body_size 10m;

  upstream gotrue      { server gotrue:9999; }
  upstream users       { server user-service:3002; }
  upstream exams       { server exam-service:3003; }
  upstream submissions { server submission-service:3004; }
  upstream frontend    { server frontend:3000; }

  # ── Landing page (phutx.top) ─────────────────────────────────────
  server {
    listen 80;
    server_name phutx.top www.phutx.top;

    # Serve landing page at root only
    location = / {
      root /var/www/landing;
      try_files /index.html =404;
    }

    # GoTrue SSO (OAuth callback comes back to this domain)
    location /auth/ {
      proxy_pass http://gotrue/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
      proxy_pass http://users/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/exams/exams/internal/       { return 403; }
    location /api/exams/collections/internal/ { return 403; }

    location /api/exams/ {
      proxy_pass http://exams/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/submissions/ {
      proxy_pass http://submissions/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # All other paths → SvelteKit app
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # ── App (localhost / default) ─────────────────────────────────────
  server {
    listen 80 default_server;

    location /auth/ {
      proxy_pass http://gotrue/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/users/ {
      proxy_pass http://users/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/exams/exams/internal/       { return 403; }
    location /api/exams/collections/internal/ { return 403; }

    location /api/exams/ {
      proxy_pass http://exams/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/submissions/ {
      proxy_pass http://submissions/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
