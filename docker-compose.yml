services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./landing:/var/www/landing:ro
      - /opt/nginx:/opt/nginx:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - gotrue
      - user-service
      - exam-service
      - submission-service
      - interaction-service
      - generator-service
      - frontend
    restart: unless-stopped

  gotrue:
    image: supabase/gotrue:v2.151.0
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/quizdb?search_path=auth
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost}
      GOTRUE_URI_ALLOW_LIST: ${SITE_URL:-http://localhost}/*,http://localhost:4000/*,https://phutx.top/*
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_LOG_LEVEL: info
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: ${GOOGLE_OAUTH_ENABLED:-false}
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${SITE_URL:-http://localhost}/auth/callback
      API_EXTERNAL_URL: ${SITE_URL:-http://localhost}
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_HOST: ""
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  user-service:
    image: ghcr.io/${GHCR_ORG:-tranphu-devops}/user-service:${TAG:-latest}
    build:
      context: ./apps/user-service
    environment:
      DATABASE_URL: ${USER_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      API_ENCRYPTION_KEY: ${API_ENCRYPTION_KEY:-}
      PORT: 3002
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_PUBLIC_URL: ${AWS_PUBLIC_URL:-}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  exam-service:
    image: ghcr.io/${GHCR_ORG:-tranphu-devops}/exam-service:${TAG:-latest}
    build:
      context: ./apps/exam-service
    environment:
      DATABASE_URL: ${EXAM_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      API_ENCRYPTION_KEY: ${API_ENCRYPTION_KEY:-}
      REDIS_URL: redis://redis:6379
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  submission-service:
    image: ghcr.io/${GHCR_ORG:-tranphu-devops}/submission-service:${TAG:-latest}
    build:
      context: ./apps/submission-service
    environment:
      DATABASE_URL: ${SUBMISSION_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      EXAM_SERVICE_URL: http://exam-service:3003
      USER_SERVICE_URL: http://user-service:3002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      API_ENCRYPTION_KEY: ${API_ENCRYPTION_KEY:-}
      PORT: 3004
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  interaction-service:
    image: ghcr.io/${GHCR_ORG:-tranphu-devops}/interaction-service:${TAG:-latest}
    build:
      context: ./apps/interaction-service
    environment:
      DATABASE_URL: ${INTERACTION_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      API_ENCRYPTION_KEY: ${API_ENCRYPTION_KEY:-}
      REDIS_URL: redis://redis:6379
      PORT: 3005
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  generator-service:
    image: ghcr.io/${GHCR_ORG:-tranphu-devops}/generator-service:${TAG:-latest}
    build:
      context: ./apps/generator-service
    environment:
      DATABASE_URL: ${GENERATOR_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      EXAM_SERVICE_URL: http://exam-service:3003
      USER_SERVICE_URL: http://user-service:3002
      GENERATOR_KEY_ENCRYPTION_KEY: ${GENERATOR_KEY_ENCRYPTION_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PORT: 3006
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  grader-service:
    image: ghcr.io/${GHCR_ORG:-tranphu-devops}/grader-service:${TAG:-latest}
    build:
      context: ./apps/grader-service
    environment:
      DATABASE_URL: ${SUBMISSION_DATABASE_URL}
      EXAM_SERVICE_URL: http://exam-service:3003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      exam-service:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_ORG:-tranphu-devops}/frontend:${TAG:-latest}
    build:
      context: ./apps/frontend
    environment:
      PORT: 3000
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quizdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Shared read-through cache for exam-service, user-service, interaction-service.
  # Best-effort: services fall back to direct DB reads if redis is unavailable.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot schema migrator: applies infra/postgres/migrations/*.sql in order,
  # tracked in public.schema_migrations, then exits. All app services wait for
  # this to complete successfully, so the schema is always up to date on boot.
  migrate:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: quizdb
    volumes:
      - ./infra/postgres/migrations:/migrations:ro
      - ./infra/postgres/run-migrations.sh:/run-migrations.sh:ro
    command: ["sh", "/run-migrations.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
