<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5625d1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Icon mark: 44x44 -->
  <rect width="44" height="44" rx="10" fill="url(#bg)"/>
  <!-- document -->
  <rect x="11" y="7" width="22" height="28" rx="3.5" fill="white" opacity="0.95"/>
  <!-- top line -->
  <line x1="15" y1="14" x2="29" y2="14" stroke="#5625d1" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- mid line -->
  <line x1="15" y1="19" x2="23" y2="19" stroke="#5625d1" stroke-width="2" stroke-linecap="round" opacity="0.28"/>
  <!-- checkmark -->
